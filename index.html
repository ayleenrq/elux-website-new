      /* Ensure React Navbar is always on top and visible */
      #react-navbar {
        display: flex !important;

        background-color: rgba(0, 0, 0, 0.8) !important;

        color: #ffffff !important;

        color: #ffffff !important;
      }
      /* Ensure Services/Industries arrows are also visible */
      html body nav#react-navbar svg {
        color: #ffffff !important;
        opacity: 1 !important;
